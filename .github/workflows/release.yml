name: release
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-dependencies
  cancel-in-progress: true

jobs:
  stable:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    if: github.ref == 'refs/heads/master'
    uses: the-guild-org/shared-config/.github/workflows/release-stable.yml@v1
    with:
      releaseScript: release
      versionScript: version
      node-version-file: .node-version
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}

  dependencies:
    uses: the-guild-org/shared-config/.github/workflows/changesets-dependencies.yml@v1
    if:
      ${{ github.event.pull_request.title != 'Upcoming Release Changes' && github.base_ref ==
      'master' }}
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}


  alpha:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    if:
      ${{ github.event.pull_request.head.repo.fork != true && github.event.pull_request.title !=
      'Upcoming Release Changes' }}
    uses: the-guild-org/shared-config/.github/workflows/release-snapshot.yml@v1
    with:
      npmTag: alpha
      buildScript: build
      node-version-file: .node-version
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}

  release-candidate:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    if:
      ${{ github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.title == 'Upcoming Release Changes' }}
    uses: the-guild-org/shared-config/.github/workflows/release-snapshot.yml@v1
    with:
      npmTag: rc
      buildScript: build
      node-version-file: .node-version
      restoreDeletedChangesets: true
    secrets:
      githubToken: ${{ secrets.BOT_GITHUB_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}
